name: Publish package to Nuget

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-*'

permissions:
  contents: write

jobs:

  Build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - name: Build
        run: dotnet build src/ResultWrapper.Library/ResultWrapper.Library.csproj -c Release
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: src/ResultWrapper.Library/bin/Release/

  Test:
    runs-on: ubuntu-latest
    needs: Build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - name: Test
        run: dotnet test src/tests/ResultWrapper.Test/ResultWrapper.Test.csproj

  Package:
    runs-on: ubuntu-latest
    needs: Test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: src/ResultWrapper.Library/bin/Release/
      - name: Pack
        run: dotnet pack src/ResultWrapper.Library/ResultWrapper.Library.csproj -c Release -p:PackageVersion=${{ github.ref_name }} --no-build
      - name: Publish to NuGet
        run: dotnet nuget push src/ResultWrapper.Library/bin/Release/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: src/ResultWrapper.Library/bin/Release/*.nupkg
